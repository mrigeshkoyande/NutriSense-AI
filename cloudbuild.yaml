steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutrisense-ai:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutrisense-ai:latest'
      - '.'

  # Step 2: Push both tags to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/nutrisense-ai'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nutrisense-ai'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nutrisense-ai:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'

images:
  - 'gcr.io/$PROJECT_ID/nutrisense-ai:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/nutrisense-ai:latest'

options:
  logging: CLOUD_LOGGING_ONLY
